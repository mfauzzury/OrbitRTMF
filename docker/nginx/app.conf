server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/spa;
    index index.html;
    charset utf-8;
    client_max_body_size 100M;

    # Laravel public files (storage symlink)
    location ^~ /storage {
        root /var/www/html/public;
        try_files $uri =404;
        access_log off;
    }

    # Laravel API, Sanctum CSRF, health (must be before SPA catch-all)
    location ^~ /api {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    location ^~ /sanctum {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    location = /up {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        # Avoid 502 "upstream sent too big header" with large Set-Cookie / Sanctum session chains
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vue SPA (history fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
